mavenPublishing {

    coordinates(GROUP, POM_ARTIFACT_ID, VERSION_NAME)

    pom {
        name = POM_NAME
        description = POM_DESCRIPTION
        inceptionYear = POM_YEAR
        url = POM_URL
        licenses {
            license {
                name = POM_LICENCE_NAME
                url = POM_LICENCE_URL
                distribution = POM_LICENCE_DIST
            }
        }
        developers {
            developer {
                id = POM_DEVELOPER_ID
                name = POM_DEVELOPER_NAME
                url = POM_DEVELOPER_URL
            }
            developer {
                id = POM_ORIGINAL_DEVELOPER_ID
                name = POM_ORIGINAL_DEVELOPER_NAME
                url = POM_ORIGINAL_DEVELOPER_URL
            }
        }
        scm {
            url = POM_SCM_URL
            connection = POM_SCM_CONNECTION
            developerConnection = POM_SCM_DEV_CONNECTION
        }
    }

    publishToMavenCentral()
    signAllPublications()
}
